name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Electron Linux (AppImage) ────────────────────────────────────────────────
  electron-linux:
    name: Electron Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dewicom-desktop/package-lock.json

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: electron-cache-${{ hashFiles('dewicom-desktop/package-lock.json') }}
          restore-keys: electron-cache-

      - name: Install dependencies
        run: npm ci
        working-directory: dewicom-desktop
        env:
          npm_config_fetch_retry_mintimeout: 20000
          npm_config_fetch_retry_maxtimeout: 120000
          npm_config_fetch_retries: 5

      - name: Build AppImage
        run: npm run build:linux
        working-directory: dewicom-desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: electron-linux
          path: dewicom-desktop/dist/*.AppImage

  # ── Electron Windows (EXE) ────────────────────────────────────────────────────
  electron-windows:
    name: Electron Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dewicom-desktop/package-lock.json

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\electron\Cache
          key: electron-cache-${{ hashFiles('dewicom-desktop/package-lock.json') }}
          restore-keys: electron-cache-

      - name: Install dependencies
        run: npm ci
        working-directory: dewicom-desktop
        env:
          npm_config_fetch_retry_mintimeout: 20000
          npm_config_fetch_retry_maxtimeout: 120000
          npm_config_fetch_retries: 5

      - name: Build EXE
        run: npm run build:win
        working-directory: dewicom-desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: electron-windows
          path: dewicom-desktop/dist/*Setup*.exe

  # ── Android APK ───────────────────────────────────────────────────────────────
  android-apk:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('dewicom-mobile/**/*.gradle*', 'dewicom-mobile/**/gradle-wrapper.properties') }}

      - name: Create keystore from secret
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > dewicom-mobile/release.keystore
            printf 'KEYSTORE_FILE=../release.keystore\nKEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}\nKEY_ALIAS=${{ secrets.KEY_ALIAS }}\nKEY_PASSWORD=${{ secrets.KEY_PASSWORD }}\n' > dewicom-mobile/keystore.properties
            echo "Keystore configuré pour build release signé"
          else
            echo "Pas de keystore — build debug"
          fi

      - name: Build APK
        run: chmod +x dewicom-mobile/gradlew && cd dewicom-mobile && ./gradlew assembleRelease --no-daemon

      - name: Rename APK with version
        run: |
          VERSION="${{ github.ref_name }}"
          SRC="dewicom-mobile/app/build/outputs/apk/release/app-release.apk"
          DST="dewicom-mobile/app/build/outputs/apk/release/DewiCom-${VERSION}.apk"
          if [ -f "$SRC" ]; then mv "$SRC" "$DST"; fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            dewicom-mobile/app/build/outputs/apk/release/DewiCom-*.apk
            dewicom-mobile/app/build/outputs/apk/debug/*.apk

  # ── GitHub Release ─────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [electron-linux, electron-windows, android-apk]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          # Extrait le bloc du CHANGELOG pour ce tag
          SECTION=$(awk "/^## \[${VERSION}\]/,/^---$/" CHANGELOG.md | head -n -1)

          if [ -z "$SECTION" ]; then
            SECTION="Voir [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md) pour le détail des changements."
          fi

          # Détermine la dernière version x.x.0 précédente pour le résumé
          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1-2)
          PREV_MAJOR_MINOR=$(awk '/^## \[/ {
            match($0, /\[([0-9]+)\.([0-9]+)\.0\]/, arr)
            if (arr[0] != "" && $0 !~ /\['"${VERSION}"'\]/) { print arr[1]"."arr[2]".0"; exit }
          }' CHANGELOG.md)

          if [ -n "$PREV_MAJOR_MINOR" ] && [ "$VERSION" != "${MAJOR_MINOR}.0" ]; then
            SINCE_SECTION=$(awk "/^## \[${MAJOR_MINOR}\\.0\]/,/^## \[${PREV_MAJOR_MINOR}\]/" CHANGELOG.md \
              | grep -v "^## \[${PREV_MAJOR_MINOR}\]" | head -n -1)
            SUMMARY="## Changements depuis v${MAJOR_MINOR}.0"$'\n'"${SINCE_SECTION}"$'\n\n---'$'\n\n'
          else
            SUMMARY=""
          fi

          BODY="${SUMMARY}${SECTION}"$'\n\n'"---"$'\n'"## Installation"$'\n'
          BODY+=$'\n''| Plateforme | Fichier | Notes |'
          BODY+=$'\n''|---|---|---|'
          BODY+=$'\n''| 🐧 Linux | `DewiCom-*.AppImage` | `chmod +x` puis lancer |'
          BODY+=$'\n''| 🪟 Windows | `DewiCom-Setup-*.exe` | Installeur NSIS |'
          BODY+=$'\n''| 🤖 Android | `DewiCom-*.apk` | Activer "sources inconnues" |'
          BODY+=$'\n\n''> **Réseau** : LAN local (WiFi/Ethernet) · Ports UDP 9998-9999 (multicast) · TCP 3001'

          # Écrit dans un fichier pour éviter les problèmes de quotes dans les variables
          echo "$BODY" > release_notes.md
          echo "notes_file=release_notes.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DewiCom ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          body_path: release_notes.md
          files: |
            artifacts/electron-linux/*.AppImage
            artifacts/electron-windows/*.exe
            artifacts/android-apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
