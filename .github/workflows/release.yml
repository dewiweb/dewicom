name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Electron Linux (AppImage) ────────────────────────────────────────────────
  electron-linux:
    name: Electron Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dewicom-desktop/package-lock.json

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: electron-cache-${{ hashFiles('dewicom-desktop/package-lock.json') }}
          restore-keys: electron-cache-

      - name: Install dependencies
        run: npm ci
        working-directory: dewicom-desktop
        env:
          npm_config_fetch_retry_mintimeout: 20000
          npm_config_fetch_retry_maxtimeout: 120000
          npm_config_fetch_retries: 5

      - name: Build AppImage
        run: npm run build:linux
        working-directory: dewicom-desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: electron-linux
          path: dewicom-desktop/dist/*.AppImage

  # ── Electron Windows (EXE) ────────────────────────────────────────────────────
  electron-windows:
    name: Electron Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dewicom-desktop/package-lock.json

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\electron\Cache
          key: electron-cache-${{ hashFiles('dewicom-desktop/package-lock.json') }}
          restore-keys: electron-cache-

      - name: Install dependencies
        run: npm ci
        working-directory: dewicom-desktop
        env:
          npm_config_fetch_retry_mintimeout: 20000
          npm_config_fetch_retry_maxtimeout: 120000
          npm_config_fetch_retries: 5

      - name: Build EXE
        run: npm run build:win
        working-directory: dewicom-desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: electron-windows
          path: dewicom-desktop/dist/*Setup*.exe

  # ── Android APK ───────────────────────────────────────────────────────────────
  android-apk:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('dewicom-mobile/**/*.gradle*', 'dewicom-mobile/**/gradle-wrapper.properties') }}

      - name: Create keystore from secret
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > dewicom-mobile/release.keystore
            printf 'KEYSTORE_FILE=../release.keystore\nKEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}\nKEY_ALIAS=${{ secrets.KEY_ALIAS }}\nKEY_PASSWORD=${{ secrets.KEY_PASSWORD }}\n' > dewicom-mobile/keystore.properties
            echo "Keystore configuré pour build release signé"
          else
            echo "Pas de keystore — build debug"
          fi

      - name: Build APK
        run: chmod +x dewicom-mobile/gradlew && cd dewicom-mobile && ./gradlew assembleRelease --no-daemon

      - name: Rename APK with version
        run: |
          VERSION="${{ github.ref_name }}"
          SRC="dewicom-mobile/app/build/outputs/apk/release/app-release.apk"
          DST="dewicom-mobile/app/build/outputs/apk/release/DewiCom-${VERSION}.apk"
          if [ -f "$SRC" ]; then mv "$SRC" "$DST"; fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            dewicom-mobile/app/build/outputs/apk/release/DewiCom-*.apk
            dewicom-mobile/app/build/outputs/apk/debug/*.apk

  # ── Docker Image (dewicom-server) ─────────────────────────────────────────────
  docker-image:
    name: Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${REPO}/dewicom-server" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: dewicom-server/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}

  # ── GitHub Release ─────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [electron-linux, electron-windows, android-apk, docker-image]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts (debug)
        run: find artifacts/ -type f | sort || echo "No artifacts found"

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          python3 - <<'PYEOF' > release_notes.md
          import re, sys

          version = "$VERSION"
          repo    = "${{ github.repository }}"

          with open("CHANGELOG.md", encoding="utf-8") as f:
              content = f.read()

          # Découpe en sections délimitées par "---"
          blocks = re.split(r'\n---\n', content)

          def find_section(ver):
              for block in blocks:
                  if re.search(r'^## \[' + re.escape(ver) + r'\]', block, re.MULTILINE):
                      return block.strip()
              return None

          section = find_section(version)

          if not section:
              print(f"Voir [CHANGELOG.md](https://github.com/{repo}/blob/master/CHANGELOG.md) pour le détail des changements.")
          else:
              # Pour une version x.x.0, afficher directement la section
              # Pour une version x.x.N (N>0), ajouter un résumé depuis x.x.0
              parts = version.split(".")
              if len(parts) == 3 and parts[2] != "0":
                  base = f"{parts[0]}.{parts[1]}.0"
                  # Collecte toutes les sections depuis base jusqu'à version
                  in_range = False
                  summary_blocks = []
                  for block in blocks:
                      if re.search(r'^## \[' + re.escape(version) + r'\]', block, re.MULTILINE):
                          in_range = True
                      if in_range:
                          summary_blocks.append(block.strip())
                      if re.search(r'^## \[' + re.escape(base) + r'\]', block, re.MULTILINE):
                          break
                  if len(summary_blocks) > 1:
                      print(f"## Changements depuis v{base}\n")
                      for b in summary_blocks:
                          print(b)
                          print()
                      print("---\n")
                  else:
                      print(section)
              else:
                  print(section)

          print()
          print("---")
          print("## Installation")
          print()
          print("| Plateforme | Fichier | Notes |")
          print("|---|---|---|")
          print("| 🐧 Linux | `DewiCom-*.AppImage` | `chmod +x` puis lancer |")
          print("| 🪟 Windows | `DewiCom-Setup-*.exe` | Installeur NSIS |")
          print("| 🤖 Android | `DewiCom-*.apk` | Activer \"sources inconnues\" |")
          print()
          print("> **Réseau** : LAN local (WiFi/Ethernet) · Ports UDP 9998-9999 (multicast) · TCP 3001")
          PYEOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DewiCom ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          body_path: release_notes.md
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.exe
            artifacts/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
